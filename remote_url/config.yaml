name: "Remote URL (Cloudflare Tunnel)"
description: "Gives Home Assistant a secure public https:// link via Cloudflare Tunnel — no port forwarding, no router changes."
version: "1.2.1"
slug: "remote_url"
init: false
startup: "services"
# Lets the add-on post the current public URL as a Home Assistant notification
# (quick mode), so you never have to dig through the Log tab to find it.
homeassistant_api: true
# Health: a Docker HEALTHCHECK (see Dockerfile) probes cloudflared's readiness.
# Enable the "Watchdog" toggle on the Info page and the Supervisor restarts the
# add-on automatically if the tunnel goes unhealthy.
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  mode: "quick"
  tunnel_token: ""
  ha_host: "homeassistant"
  ha_port: 8123
schema:
  mode: "list(quick|named)"
  tunnel_token: "str?"
  ha_host: "str"
  ha_port: "port"
