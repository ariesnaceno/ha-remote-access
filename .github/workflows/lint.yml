name: Lint add-ons

# Validates each add-on's config.yaml / Dockerfile / structure on every push and
# PR, using the official Home Assistant add-on linter. Keeps the repo from
# silently breaking when files are edited.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint ${{ matrix.addon }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon:
          - remote_url
          - private_mesh
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Run the Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: "./${{ matrix.addon }}"
