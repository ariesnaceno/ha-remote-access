name: "Private Mesh (Tailscale)"
description: "Private encrypted access to this Home Assistant for the installer/admin via Tailscale — nothing is exposed to the public internet."
version: "1.0.0"
slug: "private_mesh"
init: false
startup: "services"
boot: "auto"
host_network: true
privileged:
  - NET_ADMIN
  - NET_RAW
devices:
  - /dev/net/tun
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  auth_key: ""
  hostname: "homeassistant"
  accept_routes: false
  advertise_exit_node: false
schema:
  auth_key: "str?"
  hostname: "str"
  accept_routes: "bool"
  advertise_exit_node: "bool"
